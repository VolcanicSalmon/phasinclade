server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Required for JBrowse indexed FASTA random access
    add_header Accept-Ranges bytes always;

    # SPA routing — unknown paths fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # JBrowse data — served from the mounted volume
    location /jbrowse/ {
        try_files $uri $uri/ =404;
    }

    # Disable caching for the app shell so updates are picked up immediately
    location ~* \.(html)$ {
        add_header Cache-Control "no-cache";
    }

    # Cache static assets aggressively (CRA hashes filenames)
    location ~* \.(js|css|png|woff2?)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
